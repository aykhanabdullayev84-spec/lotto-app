<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0F2A">
    <title>Lucky Number - Счастливый Номер</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A0F2A 0%, #1E1A3A 100%);
            min-height: 100vh;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 16px 24px;
            background: rgba(30, 26, 58, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo h1 {
            font-size: 1.6em;
            font-weight: 800;
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.7em;
            color: #A0A3BD;
            margin-top: 4px;
        }

        .balance-card {
            background: linear-gradient(135deg, #2DD4BF, #1e9b8a);
            padding: 8px 20px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
        }

        .balance-card .value {
            font-size: 1.3em;
            font-weight: 800;
        }

        .cabinet-btn {
            background: rgba(245, 176, 66, 0.2);
            border: 1px solid #F5B042;
            padding: 8px 20px;
            border-radius: 40px;
            color: #F5B042;
            cursor: pointer;
            font-weight: 600;
        }

        /* Section Title */
        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            margin: 30px 0 20px;
            padding-left: 16px;
            border-left: 4px solid #F5B042;
        }

        /* Rooms Grid */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .room-card {
            background: #1E1A3A;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .room-card:hover {
            transform: translateY(-4px);
            border-color: #F5B042;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .room-bet {
            font-size: 1.8em;
            font-weight: 800;
            color: #F5B042;
        }

        .room-bet small {
            font-size: 0.4em;
            color: #A0A3BD;
        }

        .room-players-count {
            background: rgba(45, 212, 191, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            color: #2DD4BF;
        }

        .prize-info {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            margin: 12px 0;
            font-size: 0.85em;
            text-align: center;
        }

        .prize-info span {
            color: #F5B042;
            font-weight: bold;
        }

        .player-avatars {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .player-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8em;
            color: #0A0F2A;
        }

        .join-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: #F5B042;
            border: none;
            border-radius: 40px;
            color: #0A0F2A;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .join-btn:hover:not(:disabled) {
            background: #FFC75F;
            transform: translateY(-2px);
        }

        .join-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 42, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1E1A3A, #0A0F2A);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(245, 176, 66, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #F5B042;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
            font-size: 1em;
            margin: 10px 0;
            text-align: center;
            font-family: monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #F5B042;
            color: #0A0F2A;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #F5B042;
        }

        /* Game Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 42, 0.95);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .game-modal.active {
            display: flex;
        }

        .game-modal-content {
            background: linear-gradient(135deg, #1E1A3A, #0A0F2A);
            border-radius: 24px;
            padding: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(245, 176, 66, 0.3);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .player-card {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .player-card.winner {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            color: #0A0F2A;
            animation: pulse 0.5s;
        }

        .wheel {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            border-radius: 50%;
            background: conic-gradient(#F5B042 0deg 36deg, #FFC75F 36deg 72deg, #2DD4BF 72deg 108deg, #F5B042 108deg 144deg, #FFC75F 144deg 180deg, #2DD4BF 180deg 216deg, #F5B042 216deg 252deg, #FFC75F 252deg 288deg, #2DD4BF 288deg 324deg, #F5B042 324deg 360deg);
            transition: transform 3s cubic-bezier(0.33, 1, 0.68, 1);
            position: relative;
        }

        .wheel.spinning {
            transform: rotate(1440deg);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: #0A0F2A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #F5B042;
        }

        .result-box {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            padding: 16px;
            border-radius: 16px;
            margin-top: 20px;
            text-align: center;
            color: #0A0F2A;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2DD4BF;
            color: #0A0F2A;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
            z-index: 2000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(30, 26, 58, 0.5);
            border-radius: 20px;
            padding: 8px;
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            font-size: 0.8em;
            border-left: 3px solid #F5B042;
        }

        .win-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            animation: winToastPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .win-toast-content {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            color: #0A0F2A;
            padding: 24px 48px;
            border-radius: 60px;
            font-size: 1.5em;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 0 50px rgba(245, 176, 66, 0.8);
            border: 2px solid white;
        }

        @keyframes winToastPop {
            0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
            80% { transform: translate(-50%,-50%) scale(1.1); }
            100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 768px) {
            .rooms-grid { grid-template-columns: 1fr; }
            .players-grid { grid-template-columns: repeat(2, 1fr); }
            .win-toast-content { padding: 16px 24px; font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1>🎰 Lucky Number</h1>
                <p>Счастливый Номер | Моментальная лотерея</p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="balance-card" onclick="openCabinet()">
                    <div class="label">💰 Баллы</div>
                    <div class="value" id="headerBalance">0</div>
                    <div class="label">RUB</div>
                </div>
                <button class="cabinet-btn" onclick="openCabinet()">👤 Личный кабинет</button>
            </div>
        </div>

        <!-- Rooms Section -->
        <div class="section-title">🎲 Выберите комнату</div>
        <div class="rooms-grid" id="roomsGrid"></div>

        <!-- History -->
        <div class="section-title">📜 История игр</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <!-- Modals -->
    <div id="cabinetModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCabinet()">&times;</span>
            <h2>👤 Личный кабинет</h2>
            <div style="text-align: center; margin: 20px 0;">
                <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 50px; display: inline-block;">
                    🆔 <strong id="accountUserId">LUCKY_</strong>
                    <button onclick="copyUserId()" style="background: none; border: none; color: #F5B042; cursor: pointer;">📋</button>
                </div>
                <div style="margin: 20px 0;">
                    <div style="font-size: 2.5em; font-weight: 800; color: #F5B042;" id="accountBalance">0</div>
                    <div>RUB</div>
                </div>
                <div class="modal-buttons" style="flex-direction: column;">
                    <button class="modal-btn btn-primary" onclick="deposit()">💳 Пополнить баланс</button>
                    <button class="modal-btn btn-primary" onclick="withdraw()">💸 Вывести средства</button>
                    <button class="modal-btn btn-secondary" onclick="exportData()">📤 Экспорт данных</button>
                    <button class="modal-btn btn-secondary" onclick="importData()">📥 Импорт данных</button>
                    <button class="modal-btn btn-secondary" onclick="logout()" style="background: rgba(231,76,60,0.2); border-color: #e74c3c; color: #e74c3c;">🚪 Выйти</button>
                </div>
            </div>
        </div>
    </div>

    <div id="gameModal" class="game-modal">
        <div class="game-modal-content">
            <span class="close-modal" onclick="closeGameModal()">&times;</span>
            <h2 id="modalRoomTitle">Комната</h2>
            <div style="text-align: center;">
                <div class="wheel" id="wheel">
                    <div class="wheel-center" id="wheelCenter">🎲</div>
                </div>
            </div>
            <h3>Игроки в комнате (<span id="playerCount">0</span>/<span id="maxPlayers">0</span>)</h3>
            <div class="players-grid" id="playersGrid"></div>
            <div id="gameStatus" style="text-align: center; padding: 15px;"></div>
            <div id="gameResult"></div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ КОМНАТ (БЕЗ КОМИССИИ В UI) ==========
        const roomTypes = {
            3: { winners: 1, prizeMultiplier: 2, refund: null, prizeDesc: "1 победитель → 2000 RUB" },
            5: { winners: 2, prizeMultiplier: 2, refund: null, prizeDesc: "2 победителя → по 2000 RUB" },
            7: { winners: 3, prizeMultiplier: 2, refund: null, prizeDesc: "3 победителя → по 2000 RUB" },
            10: { winners: 3, prizeMultiplier: 2, refund: 1, prizeDesc: "3 победителя → по 2000 RUB + возврат 1000 RUB" }
        };

        const nominals = [1000, 2000, 5000];
        const playerCounts = [3, 5, 7, 10];

        let publicRooms = [];
        let currentUserId = null;
        let userData = null;
        let myPlayerId = null;
        let updateInterval = null;

        // Инициализация комнат
        function initPublicRooms() {
            publicRooms = [];
            for (const nominal of nominals) {
                for (const players of playerCounts) {
                    const type = roomTypes[players];
                    publicRooms.push({
                        id: `${nominal}_${players}`,
                        nominal: nominal,
                        maxPlayers: players,
                        players: [],
                        gameActive: false,
                        prizeDesc: type.prizeDesc,
                        winners: type.winners,
                        prize: nominal * type.prizeMultiplier,
                        refund: type.refund ? nominal * type.refund : null,
                        fee: nominal * 1 // комиссия скрыта от игроков
                    });
                }
            }
        }

        // Функции пользователя
        function generateNewId() { return Math.random().toString(36).substring(2, 14).toUpperCase(); }
        
        function loadUserData(id) {
            return {
                balance: parseInt(localStorage.getItem(`lucky_balance_${id}`)) || 10000,
                history: JSON.parse(localStorage.getItem(`lucky_history_${id}`) || '[]')
            };
        }
        
        function saveUserData(id, data) {
            localStorage.setItem(`lucky_balance_${id}`, data.balance);
            localStorage.setItem(`lucky_history_${id}`, JSON.stringify(data.history));
        }

        function savePublicRooms() { localStorage.setItem('lucky_rooms', JSON.stringify(publicRooms)); }
        
        function loadPublicRooms() {
            const saved = localStorage.getItem('lucky_rooms');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed && parsed.length) {
                    parsed.forEach((savedRoom, idx) => {
                        if (publicRooms[idx]) {
                            publicRooms[idx].players = savedRoom.players || [];
                            publicRooms[idx].gameActive = savedRoom.gameActive || false;
                        }
                    });
                }
            }
        }

        function renderRooms() {
            const grid = document.getElementById('roomsGrid');
            if (!grid) return;
            
            grid.innerHTML = publicRooms.map((room, idx) => `
                <div class="room-card">
                    <div class="room-header">
                        <div class="room-bet">${room.nominal.toLocaleString()} <small>RUB</small></div>
                        <div class="room-players-count">👥 ${room.maxPlayers} игроков</div>
                    </div>
                    <div class="prize-info">
                        🏆 ${room.prizeDesc}
                    </div>
                    <div class="player-avatars">
                        ${room.players.slice(0, 8).map(p => `<div class="player-dot">${p.number}</div>`).join('')}
                        ${room.players.length > 8 ? `<div class="player-dot">+${room.players.length-8}</div>` : ''}
                    </div>
                    <div>👥 ${room.players.length}/${room.maxPlayers} игроков</div>
                    <button class="join-btn" onclick="joinRoom(${idx})" 
                        ${!userData || room.players.length >= room.maxPlayers || room.gameActive || userData.balance < room.nominal ? 'disabled' : ''}>
                        ${room.players.length >= room.maxPlayers ? '🔴 Полная' : 
                          room.gameActive ? '🎲 Игра идет' : 
                          `Войти (${room.nominal.toLocaleString()} RUB)`}
                    </button>
                </div>
            `).join('');
        }

        function joinRoom(roomIdx) {
            const room = publicRooms[roomIdx];
            if (!userData) {
                showNotification('Сначала войдите в личный кабинет!', true);
                openCabinet();
                return;
            }
            if (room.players.length >= room.maxPlayers || room.gameActive || userData.balance < room.nominal) {
                showNotification('Нельзя войти в эту комнату', true);
                return;
            }

            userData.balance -= room.nominal;
            saveUserData(currentUserId, userData);
            updateUI();

            const taken = room.players.map(p => p.number);
            let available = [];
            for (let i = 1; i <= room.maxPlayers; i++) {
                if (!taken.includes(i)) available.push(i);
            }
            const number = available[Math.floor(Math.random() * available.length)];
            myPlayerId = Date.now() + Math.random();

            room.players.push({
                id: myPlayerId,
                number: number,
                joinedAt: new Date().toISOString()
            });

            savePublicRooms();
            updateUI();
            showNotification(`✅ Вы вошли под номером ${number}! (${room.players.length}/${room.maxPlayers})`);

            if (room.players.length === room.maxPlayers) {
                startGame(roomIdx);
            } else {
                openGameModal(roomIdx);
            }
        }

        function openGameModal(roomIdx) {
            const room = publicRooms[roomIdx];
            const modal = document.getElementById('gameModal');
            const currentPlayer = room.players.find(p => p.id === myPlayerId);
            
            document.getElementById('modalRoomTitle').textContent = `Комната ${room.nominal.toLocaleString()} RUB - Ваш номер ${currentPlayer?.number || '?'}`;
            document.getElementById('maxPlayers').textContent = room.maxPlayers;
            document.getElementById('playerCount').textContent = room.players.length;
            document.getElementById('gameStatus').innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h3>⏳ Ожидание игроков...</h3>
                    <p style="font-size: 2em; color: #F5B042;">🎲 ${currentPlayer?.number || '?'}</p>
                    <p>Игроков в комнате: ${room.players.length}/${room.maxPlayers}</p>
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px;">
                        ${room.players.map(p => `<span style="background: rgba(245,176,66,0.2); padding: 5px 12px; border-radius: 20px;">Номер ${p.number}</span>`).join('')}
                    </div>
                    <p style="margin-top: 15px;">🏆 ${room.prizeDesc}</p>
                </div>
            `;
            modal.classList.add('active');

            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                const updatedRoom = publicRooms[roomIdx];
                if (updatedRoom && document.getElementById('gameModal').classList.contains('active')) {
                    document.getElementById('playerCount').textContent = updatedRoom.players.length;
                    if (updatedRoom.players.length === updatedRoom.maxPlayers && !updatedRoom.gameActive) {
                        clearInterval(updateInterval);
                        startGame(roomIdx);
                    }
                }
            }, 1000);
        }

        function startGame(roomIdx) {
            const room = publicRooms[roomIdx];
            if (room.gameActive) return;
            room.gameActive = true;
            savePublicRooms();

            const modal = document.getElementById('gameModal');
            if (modal && modal.classList.contains('active')) {
                document.getElementById('gameStatus').innerHTML = '<h3>🎰 Игра начинается! Крутим рулетку...</h3>';
            }
            updateUI();

            setTimeout(() => spinWheel(roomIdx), 2000);
        }

        function spinWheel(roomIdx) {
            const room = publicRooms[roomIdx];
            const totalPot = room.nominal * room.players.length;
            const platformFee = room.fee;

            const players = [...room.players];
            for (let i = players.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [players[i], players[j]] = [players[j], players[i]];
            }

            const winners = [];
            for (let i = 0; i < room.winners && i < players.length; i++) {
                winners.push({ player: players[i], prize: room.prize });
            }
            if (room.refund && players.length >= room.winners + 1) {
                winners.push({ player: players[room.winners], prize: room.refund });
            }

            const wheel = document.getElementById('wheel');
            const wheelCenter = document.getElementById('wheelCenter');

            if (wheel) {
                wheel.classList.add('spinning');
                const spinInterval = setInterval(() => {
                    const randomNum = Math.floor(Math.random() * room.maxPlayers) + 1;
                    if (wheelCenter) wheelCenter.textContent = randomNum;
                }, 100);

                setTimeout(() => {
                    clearInterval(spinInterval);
                    wheel.classList.remove('spinning');
                    if (wheelCenter) wheelCenter.textContent = winners[0]?.player.number || '?';

                    let myWin = 0;
                    let myWinningNumber = null;
                    
                    room.players = room.players.map(p => {
                        const win = winners.find(w => w.player.id === p.id);
                        if (win) {
                            if (p.id === myPlayerId) {
                                userData.balance += win.prize;
                                myWin = win.prize;
                                myWinningNumber = p.number;
                            }
                        }
                        return p;
                    });

                    if (myWin > 0) {
                        showWinToast(myWin, myWinningNumber);
                        blinkTabTitle();
                    }

                    const gameRecord = {
                        date: new Date().toLocaleString(),
                        nominal: room.nominal,
                        maxPlayers: room.maxPlayers,
                        totalPot: totalPot,
                        winners: winners.map(w => ({ number: w.player.number, prize: w.prize })),
                        myWin: myWin
                    };
                    userData.history.unshift(gameRecord);
                    saveUserData(currentUserId, userData);

                    const resultDiv = document.getElementById('gameResult');
                    resultDiv.innerHTML = `
                        <div class="result-box">
                            <h3>🎉 РЕЗУЛЬТАТЫ РОЗЫГРЫША! 🎉</h3>
                            <p><strong>Общий банк:</strong> ${totalPot.toLocaleString()} RUB</p>
                            <hr>
                            <h4>🏆 Победители:</h4>
                            ${winners.map(w => `🎲 Номер ${w.player.number} - выиграл ${w.prize.toLocaleString()} RUB`).join('<br>')}
                            ${myWin ? `<h3 style="margin-top: 15px;">✨ ВЫ ВЫИГРАЛИ ${myWin.toLocaleString()} RUB! ✨</h3>` : '<p style="margin-top: 15px;">😢 В следующий раз повезет!</p>'}
                        </div>
                    `;

                    publicRooms[roomIdx] = { ...room, players: [], gameActive: false };
                    savePublicRooms();
                    updateUI();
                    renderHistory();

                    setTimeout(() => closeGameModal(), 8000);
                }, 3000);
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (!userData || userData.history.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">История игр пуста</div>';
                return;
            }
            container.innerHTML = userData.history.slice(0, 15).map(game => `
                <div class="history-item">
                    <strong>📅 ${game.date}</strong><br>
                    🎲 Комната ${game.nominal.toLocaleString()} RUB | 👥 ${game.maxPlayers} игроков<br>
                    🏆 Победители: ${game.winners.map(w => `#${w.number} (${w.prize.toLocaleString()} RUB)`).join(', ')}<br>
                    ${game.myWin > 0 ? `🎉 Ваш выигрыш: ${game.myWin.toLocaleString()} RUB!` : '😢 Вы не выиграли'}
                </div>
            `).join('');
        }

        function updateUI() {
            if (userData) {
                document.getElementById('headerBalance').textContent = userData.balance;
                document.getElementById('accountBalance').textContent = userData.balance;
                document.getElementById('accountUserId').textContent = `LUCKY_${currentUserId}`;
            }
            renderRooms();
            renderHistory();
        }

        function showNotification(message, isError = false) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.background = isError ? '#e74c3c' : '#2DD4BF';
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function showWinToast(amount, number) {
            const toast = document.createElement('div');
            toast.className = 'win-toast';
            toast.innerHTML = `<div class="win-toast-content">🎉✨ ПОБЕДА! ✨🎉<br>Ваш номер ${number} выиграл!<br>+${amount.toLocaleString()} RUB</div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function blinkTabTitle() {
            const originalTitle = document.title;
            let count = 0;
            const interval = setInterval(() => {
                document.title = count % 2 === 0 ? '🏆 ПОБЕДА! 🏆' : originalTitle;
                count++;
                if (count > 10) clearInterval(interval);
            }, 500);
        }

        // Cabinet functions
        function openCabinet() { document.getElementById('cabinetModal').classList.add('active'); }
        function closeCabinet() { document.getElementById('cabinetModal').classList.remove('active'); }
        function closeGameModal() { document.getElementById('gameModal').classList.remove('active'); if (updateInterval) clearInterval(updateInterval); }
        
        function copyUserId() { navigator.clipboard.writeText(`LUCKY_${currentUserId}`); showNotification('✅ ID скопирован!'); }
        
        function deposit() { const amount = prompt('Введите сумму:', '1000'); if (amount && !isNaN(amount) && parseInt(amount) > 0) { userData.balance += parseInt(amount); saveUserData(currentUserId, userData); updateUI(); showNotification(`✅ Пополнено на ${parseInt(amount).toLocaleString()} RUB`); } }
        
        function withdraw() { const amount = prompt('Введите сумму вывода:', '1000'); if (amount && !isNaN(amount) && parseInt(amount) > 0 && userData.balance >= parseInt(amount)) { userData.balance -= parseInt(amount); saveUserData(currentUserId, userData); updateUI(); showNotification(`✅ Заявка на вывод ${parseInt(amount).toLocaleString()} RUB принята`); } else { showNotification('❌ Недостаточно средств', true); } }
        
        function exportData() { const data = { userId: currentUserId, balance: userData.balance, history: userData.history }; const blob = new Blob([JSON.stringify(data)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `lucky_backup_${currentUserId}.json`; a.click(); showNotification('📤 Данные экспортированы'); }
        
        function importData() { const input = document.createElement('input'); input.type = 'file'; input.onchange = e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = ev => { const data = JSON.parse(ev.target.result); if (data.userId) currentUserId = data.userId; if (data.balance) userData.balance = data.balance; if (data.history) userData.history = data.history; saveUserData(currentUserId, userData); updateUI(); showNotification('✅ Данные импортированы'); }; reader.readAsText(file); }; input.click(); }
        
        function logout() { if (confirm('Выйти?')) { currentUserId = null; userData = null; updateUI(); closeCabinet(); showNotification('👋 Вы вышли'); } }

        // Initialize
        initPublicRooms();
        loadPublicRooms();
        currentUserId = generateNewId();
        userData = loadUserData(currentUserId);
        updateUI();

        setInterval(() => {
            publicRooms.forEach((room, idx) => {
                if (room.players.length === room.maxPlayers && !room.gameActive) {
                    startGame(idx);
                }
            });
        }, 2000);
    </script>
</body>
</html>
