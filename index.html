<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lucky Number - Счастливый Номер | Моментальная лотерея</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A0F2A 0%, #1E1A3A 100%);
            min-height: 100vh;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 48px;
            padding: 20px 24px;
            background: rgba(30, 26, 58, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo h1 {
            font-size: 1.8em;
            font-weight: 800;
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p {
            font-size: 0.8em;
            color: #A0A3BD;
            margin-top: 4px;
        }

        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .balance-card {
            background: linear-gradient(135deg, #2DD4BF, #1e9b8a);
            padding: 8px 20px;
            border-radius: 40px;
            text-align: center;
        }
        .balance-card .label {
            font-size: 0.7em;
            opacity: 0.8;
        }
        .balance-card .value {
            font-size: 1.5em;
            font-weight: 800;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9em;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #F5B042;
            color: #0A0F2A;
        }
        .btn-primary:hover {
            background: #FFC75F;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .section-title {
            font-size: 1.5em;
            font-weight: 700;
            margin: 48px 0 24px;
            padding-left: 16px;
            border-left: 4px solid #F5B042;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .room-card {
            background: #1E1A3A;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .room-card:hover {
            transform: translateY(-4px);
            border-color: #F5B042;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }
        .room-bet {
            font-size: 2em;
            font-weight: 800;
            color: #F5B042;
        }
        .room-bet small {
            font-size: 0.4em;
            color: #A0A3BD;
        }
        .room-players-count {
            background: rgba(45, 212, 191, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #2DD4BF;
        }
        .prize-info {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 0.85em;
        }
        .prize-info span {
            color: #F5B042;
            font-weight: bold;
        }
        .player-avatars {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .player-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0A0F2A;
        }
        .join-btn {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #F5B042;
            border: none;
            border-radius: 40px;
            color: #0A0F2A;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
        }
        .join-btn:hover:not(:disabled) {
            background: #FFC75F;
            transform: translateY(-2px);
        }
        .join-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 42, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, #1E1A3A, #0A0F2A);
            border-radius: 24px;
            padding: 32px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(245, 176, 66, 0.3);
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #F5B042;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .player-card {
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .player-card.winner {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            color: #0A0F2A;
            animation: pulse 0.5s;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .player-number {
            font-size: 1.8em;
            font-weight: 800;
        }
        .wheel {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: conic-gradient(#F5B042 0deg 36deg, #FFC75F 36deg 72deg, #2DD4BF 72deg 108deg, #F5B042 108deg 144deg, #FFC75F 144deg 180deg, #2DD4BF 180deg 216deg, #F5B042 216deg 252deg, #FFC75F 252deg 288deg, #2DD4BF 288deg 324deg, #F5B042 324deg 360deg);
            transition: transform 3s cubic-bezier(0.33, 1, 0.68, 1);
            position: relative;
        }
        .wheel.spinning {
            transform: rotate(1440deg);
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: #0A0F2A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            border: 2px solid #F5B042;
        }
        .result-box {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            text-align: center;
            color: #0A0F2A;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2DD4BF;
            color: #0A0F2A;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
            z-index: 2000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .history-list {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(30, 26, 58, 0.5);
            border-radius: 20px;
            padding: 8px;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            font-size: 0.85em;
            border-left: 3px solid #F5B042;
        }
        .fair-play-badge {
            text-align: center;
            margin-top: 40px;
            padding: 16px;
            font-size: 0.75em;
            color: #A0A3BD;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; }
            .rooms-grid { grid-template-columns: 1fr; }
            .players-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🎰 Lucky Number</h1>
                <p>Счастливый Номер | Моментальная лотерея</p>
            </div>
            <div class="user-info">
                <div class="balance-card">
                    <div class="label">💰 Ваш баланс</div>
                    <div class="value" id="balance">10000</div>
                    <div class="label">RUB</div>
                </div>
                <button class="btn btn-secondary" onclick="game.showDepositModal()">💳 Пополнить</button>
            </div>
        </div>

        <div class="section-title">🎲 Выберите комнату</div>
        <div class="rooms-grid" id="roomsGrid"></div>

        <div class="section-title">📜 История игр</div>
        <div class="history-list" id="historyList"></div>
        
        <div class="fair-play-badge">
            <span>🛡️ Provably Fair • Сертифицированный ГСЧ • Честный розыгрыш</span>
        </div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <span class="close-modal" onclick="game.closeModal()">&times;</span>
            <h2 id="modalRoomTitle">Комната</h2>
            <div style="text-align: center;">
                <div class="wheel" id="wheel">
                    <div class="wheel-center" id="wheelCenter">🎲</div>
                </div>
            </div>
            <div class="players-list">
                <h3>Игроки в комнате (<span id="playerCount">0</span>/<span id="maxPlayers">0</span>)</h3>
                <div class="players-grid" id="playersGrid"></div>
            </div>
            <div id="gameStatus" style="text-align: center; padding: 15px;"></div>
            <div id="gameResult"></div>
        </div>
    </div>

    <script>
        class LuckyNumberGame {
            constructor() {
                this.balance = 10000;
                this.currentRoom = null;
                this.myPlayerId = null;
                this.myNumber = null;
                this.totalGamesPlayed = 0;
                this.totalPaidOut = 0;
                this.totalCommission = 0;
                
                // КОМНАТЫ С ПРАВИЛЬНОЙ МАТЕМАТИКОЙ
                this.rooms = [
                    // Номинал 1000 RUB
                    { nominal: 1000, maxPlayers: 3, players: [], gameActive: false, 
                      prizeDistribution: { winners: 1, winnerPrize: 2000, platformFee: 1000, description: "1 победитель → 2000 RUB" } },
                    { nominal: 1000, maxPlayers: 5, players: [], gameActive: false, 
                      prizeDistribution: { winners: 2, winnerPrize: 2000, platformFee: 1000, description: "2 победителя → по 2000 RUB" } },
                    { nominal: 1000, maxPlayers: 7, players: [], gameActive: false, 
                      prizeDistribution: { winners: 3, winnerPrize: 1000, platformFee: 1000, description: "3 победителя → по 1000 RUB" } },
                    { nominal: 1000, maxPlayers: 10, players: [], gameActive: false, 
                      prizeDistribution: { winners: 3, winnerPrize: 2000, refundWinner: true, refundPrize: 1000, platformFee: 3000, description: "3 победителя → по 2000 RUB + 1 возврат 1000 RUB" } },
                    
                    // Номинал 2000 RUB
                    { nominal: 2000, maxPlayers: 3, players: [], gameActive: false, 
                      prizeDistribution: { winners: 1, winnerPrize: 4000, platformFee: 2000, description: "1 победитель → 4000 RUB" } },
                    { nominal: 2000, maxPlayers: 5, players: [], gameActive: false, 
                      prizeDistribution: { winners: 2, winnerPrize: 4000, platformFee: 2000, description: "2 победителя → по 4000 RUB" } },
                    { nominal: 2000, maxPlayers: 7, players: [], gameActive: false, 
                      prizeDistribution: { winners: 3, winnerPrize: 2000, platformFee: 2000, description: "3 победителя → по 2000 RUB" } },
                    { nominal: 2000, maxPlayers: 10, players: [], gameActive: false, 
                      prizeDistribution: { winners: 3, winnerPrize: 4000, refundWinner: true, refundPrize: 2000, platformFee: 6000, description: "3 победителя → по 4000 RUB + 1 возврат 2000 RUB" } },
                    
                    // Номинал 5000 RUB
                    { nominal: 5000, maxPlayers: 3, players: [], gameActive: false, 
                      prizeDistribution: { winners: 1, winnerPrize: 10000, platformFee: 5000, description: "1 победитель → 10000 RUB" } },
                    { nominal: 5000, maxPlayers: 5, players: [], gameActive: false, 
                      prizeDistribution: { winners: 2, winnerPrize: 10000, platformFee: 5000, description: "2 победителя → по 10000 RUB" } },
                    { nominal: 5000, maxPlayers: 7, players: [], gameActive: false, 
                      prizeDistribution: { winners: 3, winnerPrize: 5000, platformFee: 5000, description: "3 победителя → по 5000 RUB" } },
                    { nominal: 5000, maxPlayers: 10, players: [], gameActive: false, 
                      prizeDistribution: { winners: 3, winnerPrize: 10000, refundWinner: true, refundPrize: 5000, platformFee: 15000, description: "3 победителя → по 10000 RUB + 1 возврат 5000 RUB" } }
                ];
                
                this.history = [];
                this.updateInterval = null;
                
                this.loadData();
                this.init();
            }

            init() {
                this.renderRooms();
                this.renderHistory();
                this.updateBalance();
            }

            loadData() {
                const savedBalance = localStorage.getItem('lucky_balance');
                if (savedBalance) this.balance = parseInt(savedBalance);
                
                const savedHistory = localStorage.getItem('lucky_history');
                if (savedHistory) this.history = JSON.parse(savedHistory);
            }

            saveData() {
                localStorage.setItem('lucky_balance', this.balance);
                localStorage.setItem('lucky_history', JSON.stringify(this.history));
            }

            updateBalance() {
                document.getElementById('balance').textContent = this.balance;
            }

            showNotification(message, isError = false) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                notification.style.background = isError ? '#e74c3c' : '#2DD4BF';
                notification.style.color = isError ? 'white' : '#0A0F2A';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }

            getPrizeDescription(room) {
                return room.prizeDistribution.description;
            }

            renderRooms() {
                const grid = document.getElementById('roomsGrid');
                if (!grid) return;
                
                grid.innerHTML = this.rooms.map((room, index) => `
                    <div class="room-card">
                        <div class="room-header">
                            <div class="room-bet">${room.nominal.toLocaleString()} <small>RUB</small></div>
                            <div class="room-players-count">👥 ${room.maxPlayers} игроков</div>
                        </div>
                        <div class="prize-info">
                            🏆 ${this.getPrizeDescription(room)}<br>
                            💰 Комиссия: ${room.prizeDistribution.platformFee.toLocaleString()} RUB
                        </div>
                        <div class="player-avatars">
                            ${room.players.slice(0, 8).map(p => `<div class="player-dot">${p.number}</div>`).join('')}
                            ${room.players.length > 8 ? `<div class="player-dot">+${room.players.length-8}</div>` : ''}
                        </div>
                        <div>👥 ${room.players.length}/${room.maxPlayers} игроков</div>
                        <button class="join-btn" onclick="game.joinRoom(${index})" 
                            ${room.players.length >= room.maxPlayers || room.gameActive || this.balance < room.nominal ? 'disabled' : ''}>
                            ${room.players.length >= room.maxPlayers ? '🔴 Полная' : 
                              room.gameActive ? '🎲 Игра идет' : 
                              `Войти (${room.nominal.toLocaleString()} RUB)`}
                        </button>
                    </div>
                `).join('');
            }

            joinRoom(roomIndex) {
                const room = this.rooms[roomIndex];
                
                if (room.players.length >= room.maxPlayers) {
                    this.showNotification('Комната уже полна!', true);
                    return;
                }
                if (room.gameActive) {
                    this.showNotification('Игра уже началась!', true);
                    return;
                }
                if (this.balance < room.nominal) {
                    this.showNotification(`Недостаточно средств! Нужно ${room.nominal.toLocaleString()} RUB`, true);
                    return;
                }
                
                this.balance -= room.nominal;
                this.updateBalance();
                
                const takenNumbers = room.players.map(p => p.number);
                let availableNumbers = [];
                for (let i = 1; i <= room.maxPlayers; i++) {
                    if (!takenNumbers.includes(i)) availableNumbers.push(i);
                }
                
                const randomNumber = availableNumbers[Math.floor(Math.random() * availableNumbers.length)];
                this.myNumber = randomNumber;
                this.myPlayerId = Date.now() + Math.random();
                
                room.players.push({
                    id: this.myPlayerId,
                    number: randomNumber,
                    joinedAt: new Date().toISOString()
                });
                
                this.showNotification(`✅ Вы вошли под номером ${randomNumber}!`);
                this.renderRooms();
                this.saveData();
                
                if (room.players.length === room.maxPlayers) {
                    this.startGame(roomIndex);
                } else {
                    this.openGameModal(roomIndex);
                }
            }
            
            openGameModal(roomIndex) {
                const room = this.rooms[roomIndex];
                this.currentRoom = { ...room, index: roomIndex };
                
                const modal = document.getElementById('gameModal');
                document.getElementById('modalRoomTitle').textContent = `Комната ${room.nominal.toLocaleString()} RUB - Ваш номер ${this.myNumber}`;
                document.getElementById('maxPlayers').textContent = room.maxPlayers;
                document.getElementById('playerCount').textContent = room.players.length;
                document.getElementById('gameStatus').innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h3>⏳ Ожидание игроков...</h3>
                        <p style="font-size: 2em; color: #F5B042;">🎲 ${this.myNumber}</p>
                        <p>Игроков в комнате: ${room.players.length}/${room.maxPlayers}</p>
                        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px;">
                            ${room.players.map(p => `<span style="background: rgba(245,176,66,0.2); padding: 5px 12px; border-radius: 20px;">Номер ${p.number}</span>`).join('')}
                        </div>
                        <p style="margin-top: 15px;">🏆 ${this.getPrizeDescription(room)}</p>
                        <p>💰 Комиссия: ${room.prizeDistribution.platformFee.toLocaleString()} RUB</p>
                    </div>
                `;
                modal.classList.add('active');
                
                if (this.updateInterval) clearInterval(this.updateInterval);
                this.updateInterval = setInterval(() => {
                    const updatedRoom = this.rooms[roomIndex];
                    if (updatedRoom && document.getElementById('gameModal').classList.contains('active')) {
                        document.getElementById('playerCount').textContent = updatedRoom.players.length;
                        if (updatedRoom.players.length === updatedRoom.maxPlayers && !updatedRoom.gameActive) {
                            clearInterval(this.updateInterval);
                            this.startGame(roomIndex);
                        }
                    }
                }, 1000);
            }
            
            startGame(roomIndex) {
                const room = this.rooms[roomIndex];
                if (room.gameActive) return;
                room.gameActive = true;
                this.currentRoom = { ...room, index: roomIndex };
                
                const modal = document.getElementById('gameModal');
                if (modal) {
                    document.getElementById('gameStatus').innerHTML = '<h3>🎰 Игра начинается! Крутим рулетку...</h3>';
                    this.renderPlayersInModal();
                }
                
                setTimeout(() => this.spinWheel(), 2000);
            }
            
            renderPlayersInModal() {
                if (!this.currentRoom) return;
                const grid = document.getElementById('playersGrid');
                if (!grid) return;
                
                grid.innerHTML = this.currentRoom.players.map(player => `
                    <div class="player-card">
                        <div class="player-number">🎲 ${player.number}</div>
                        <div>${player.id === this.myPlayerId ? '⭐ Вы' : 'Игрок'}</div>
                        <div style="color: #2DD4BF;">${player.prize ? `+${player.prize.toLocaleString()} RUB` : ''}</div>
                    </div>
                `).join('');
                document.getElementById('playerCount').textContent = this.currentRoom.players.length;
            }
            
            spinWheel() {
                const room = this.currentRoom;
                const totalPot = room.nominal * room.players.length;
                const platformFee = room.prizeDistribution.platformFee;
                const dist = room.prizeDistribution;
                
                // Перемешиваем игроков
                const players = [...room.players];
                for (let i = players.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [players[i], players[j]] = [players[j], players[i]];
                }
                
                // Определяем победителей
                const winners = [];
                for (let i = 0; i < dist.winners && i < players.length; i++) {
                    winners.push({
                        player: players[i],
                        prize: dist.winnerPrize
                    });
                }
                
                // Для комнаты 10 человек добавляем возврат ставки
                if (dist.refundWinner && players.length >= dist.winners + 1) {
                    winners.push({
                        player: players[dist.winners],
                        prize: dist.refundPrize
                    });
                }
                
                const wheel = document.getElementById('wheel');
                const wheelCenter = document.getElementById('wheelCenter');
                
                if (wheel) {
                    wheel.classList.add('spinning');
                    let spinCount = 0;
                    const spinInterval = setInterval(() => {
                        const randomNum = Math.floor(Math.random() * room.maxPlayers) + 1;
                        if (wheelCenter) wheelCenter.textContent = randomNum;
                        spinCount++;
                    }, 100);
                    
                    setTimeout(() => {
                        clearInterval(spinInterval);
                        wheel.classList.remove('spinning');
                        if (wheelCenter) wheelCenter.textContent = winners[0]?.player.number || '?';
                        
                        // Начисляем выигрыши
                        room.players = room.players.map(p => {
                            const win = winners.find(w => w.player.id === p.id);
                            if (win) {
                                p.won = true;
                                p.prize = win.prize;
                                if (p.id === this.myPlayerId) {
                                    this.balance += win.prize;
                                    this.updateBalance();
                                }
                            }
                            return p;
                        });
                        
                        this.renderPlayersInModal();
                        
                        const resultDiv = document.getElementById('gameResult');
                        const winnersList = winners.map(w => `🎲 Номер ${w.player.number} - выиграл ${w.prize.toLocaleString()} RUB`).join('<br>');
                        const myWin = winners.find(w => w.player.id === this.myPlayerId);
                        
                        resultDiv.innerHTML = `
                            <div class="result-box">
                                <h3>🎉 РЕЗУЛЬТАТЫ РОЗЫГРЫША! 🎉</h3>
                                <p><strong>Общий банк:</strong> ${totalPot.toLocaleString()} RUB</p>
                                <p><strong>💰 Комиссия платформы:</strong> ${platformFee.toLocaleString()} RUB</p>
                                <p><strong>🎁 Призовой фонд:</strong> ${(totalPot - platformFee).toLocaleString()} RUB</p>
                                <hr>
                                <h4>🏆 Победители:</h4>
                                ${winnersList}
                                ${myWin ? `<h3 style="margin-top: 15px;">✨ ВЫ ВЫИГРАЛИ ${myWin.prize.toLocaleString()} RUB! ✨</h3>` : '<p style="margin-top: 15px;">😢 В следующий раз повезет!</p>'}
                            </div>
                        `;
                        
                        const gameRecord = {
                            id: Date.now(),
                            date: new Date().toLocaleString(),
                            nominal: room.nominal,
                            maxPlayers: room.maxPlayers,
                            totalPot: totalPot,
                            platformFee: platformFee,
                            winners: winners.map(w => ({ number: w.player.number, prize: w.prize })),
                            myNumber: this.myNumber,
                            myWin: myWin ? myWin.prize : 0
                        };
                        
                        this.history.unshift(gameRecord);
                        if (this.history.length > 30) this.history.pop();
                        
                        this.saveData();
                        this.renderHistory();
                        
                        // Очищаем комнату
                        this.rooms[room.index] = {
                            nominal: room.nominal,
                            maxPlayers: room.maxPlayers,
                            players: [],
                            gameActive: false,
                            prizeDistribution: room.prizeDistribution
                        };
                        
                        this.renderRooms();
                        
                        setTimeout(() => this.closeModal(), 8000);
                    }, 3000);
                }
            }
            
            renderHistory() {
                const historyDiv = document.getElementById('historyList');
                if (!historyDiv) return;
                
                if (this.history.length === 0) {
                    historyDiv.innerHTML = '<div style="text-align: center; color: #A0A3BD; padding: 20px;">История игр пуста</div>';
                    return;
                }
                
                historyDiv.innerHTML = this.history.slice(0, 15).map(game => `
                    <div class="history-item">
                        <strong>📅 ${game.date}</strong><br>
                        🎲 Комната ${game.nominal.toLocaleString()} RUB | 👥 ${game.maxPlayers} игроков<br>
                        🏆 Победители: ${game.winners.map(w => `#${w.number} (${w.prize.toLocaleString()} RUB)`).join(', ')}<br>
                        💰 Комиссия: ${game.platformFee.toLocaleString()} RUB<br>
                        ${game.myWin > 0 ? `🎉 Ваш выигрыш: ${game.myWin.toLocaleString()} RUB!` : '😢 Вы не выиграли'}
                    </div>
                `).join('');
            }
            
            showDepositModal() {
                const amount = prompt('Введите сумму пополнения (RUB):', '1000');
                if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                    this.balance += parseInt(amount);
                    this.updateBalance();
                    this.saveData();
                    this.showNotification(`Баланс пополнен на ${parseInt(amount).toLocaleString()} RUB!`);
                    this.renderRooms();
                }
            }
            
            closeModal() {
                const modal = document.getElementById('gameModal');
                if (modal) {
                    modal.classList.remove('active');
                    document.getElementById('gameResult').innerHTML = '';
                    this.currentRoom = null;
                    if (this.updateInterval) clearInterval(this.updateInterval);
                }
            }
        }
        
        const game = new LuckyNumberGame();
    </script>
</body>
</html>
