<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0A0F2A">
    <title>Lucky Number - Счастливый Номер</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A0F2A 0%, #1E1A3A 100%);
            min-height: 100vh;
            color: #FFFFFF;
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(30, 26, 58, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo h1 {
            font-size: 1.3em;
            font-weight: 800;
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.6em;
            color: #A0A3BD;
        }

        .balance-card {
            background: linear-gradient(135deg, #2DD4BF, #1e9b8a);
            padding: 6px 12px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
        }

        .balance-card .value {
            font-size: 1.1em;
            font-weight: 800;
        }

        .cabinet-btn, .create-room-btn {
            background: rgba(245, 176, 66, 0.2);
            border: 1px solid #F5B042;
            padding: 6px 12px;
            border-radius: 40px;
            color: #F5B042;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
        }

        .create-room-btn {
            background: linear-gradient(135deg, #2DD4BF, #1e9b8a);
            border: none;
            color: #0A0F2A;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            color: #0A0F2A;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .room-card {
            background: #1E1A3A;
            border-radius: 20px;
            padding: 16px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .room-card.private {
            border: 2px solid #2DD4BF;
            background: rgba(45, 212, 191, 0.1);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .room-bet {
            font-size: 1.5em;
            font-weight: 800;
            color: #F5B042;
        }

        .room-players-count {
            background: rgba(45, 212, 191, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            color: #2DD4BF;
        }

        .private-badge {
            background: rgba(45, 212, 191, 0.3);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.65em;
            color: #2DD4BF;
            display: inline-block;
            margin-bottom: 8px;
        }

        .invite-code {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 8px;
            font-size: 0.75em;
            margin: 8px 0;
            text-align: center;
        }

        .prize-info {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.75em;
            text-align: center;
        }

        .player-avatars {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .player-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7em;
            color: #0A0F2A;
        }

        .join-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #F5B042;
            border: none;
            border-radius: 40px;
            color: #0A0F2A;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9em;
        }

        .join-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 42, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1E1A3A, #0A0F2A);
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(245, 176, 66, 0.3);
        }

        .modal-content h2 {
            font-size: 1.4em;
            margin-bottom: 15px;
            color: #F5B042;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
            font-size: 1em;
            margin: 10px 0;
            text-align: center;
        }

        select.modal-input {
            appearance: none;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #F5B042;
            color: #0A0F2A;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #F5B042;
        }

        .share-code {
            background: #0A0F2A;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.2em;
            letter-spacing: 2px;
            margin: 10px 0;
            text-align: center;
        }

        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 42, 0.95);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .game-modal.active {
            display: flex;
        }

        .game-modal-content {
            background: linear-gradient(135deg, #1E1A3A, #0A0F2A);
            border-radius: 24px;
            padding: 20px;
            max-width: 90%;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(245, 176, 66, 0.3);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .player-card {
            text-align: center;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .wheel {
            width: 150px;
            height: 150px;
            margin: 15px auto;
            border-radius: 50%;
            transition: transform 3s cubic-bezier(0.33, 1, 0.68, 1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(#F5B042 0deg 36deg, #FFC75F 36deg 72deg, #2DD4BF 72deg 108deg, #F5B042 108deg 144deg, #FFC75F 144deg 180deg, #2DD4BF 180deg 216deg, #F5B042 216deg 252deg, #FFC75F 252deg 288deg, #2DD4BF 288deg 324deg, #F5B042 324deg 360deg);
        }

        .wheel.spinning {
            transform: rotate(1440deg);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: #0A0F2A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            border: 2px solid #F5B042;
            z-index: 10;
        }

        .result-box {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            padding: 12px;
            border-radius: 16px;
            margin-top: 15px;
            text-align: center;
            color: #0A0F2A;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: 20px;
            background: #2DD4BF;
            color: #0A0F2A;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            text-align: center;
            animation: slideIn 0.3s ease;
            z-index: 2000;
        }

        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
            background: rgba(30, 26, 58, 0.5);
            border-radius: 20px;
            padding: 8px;
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            margin: 6px 0;
            border-radius: 12px;
            font-size: 0.75em;
            border-left: 3px solid #F5B042;
        }

        .win-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            animation: winToastPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .win-toast-content {
            background: linear-gradient(135deg, #F5B042, #FFC75F);
            color: #0A0F2A;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 1.2em;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 0 30px rgba(245, 176, 66, 0.8);
            border: 2px solid white;
        }

        @keyframes winToastPop {
            0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
            80% { transform: translate(-50%,-50%) scale(1.1); }
            100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
        }

        .section-title {
            font-size: 1.2em;
            font-weight: 700;
            margin: 20px 0 15px;
            padding-left: 12px;
            border-left: 3px solid #F5B042;
        }

        .share-panel {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .rooms-grid { grid-template-columns: 1fr; }
            .players-grid { grid-template-columns: repeat(2, 1fr); }
            .tabs { justify-content: center; }
            .header { flex-direction: column; text-align: center; }
            .modal-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🎰 Lucky Number</h1>
                <p>Счастливый Номер | Играй с друзьями</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;">
                <div class="balance-card" onclick="openCabinet()">
                    <div class="label">💰 Баллы</div>
                    <div class="value" id="headerBalance">0</div>
                    <div class="label">RUB</div>
                </div>
                <button class="cabinet-btn" onclick="openCabinet()">👤 Кабинет</button>
                <button class="create-room-btn" onclick="openCreatePrivateModal()">✨ Создать комнату</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('public')">🎲 Публичные</button>
            <button class="tab-btn" onclick="switchTab('private')">🔒 Мои комнаты</button>
            <button class="tab-btn" onclick="openJoinPrivateModal()">🔑 Войти по коду</button>
        </div>

        <div id="publicTab" class="rooms-grid"></div>
        <div id="privateTab" class="rooms-grid" style="display: none;"></div>

        <div class="section-title">📜 История игр</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div id="createPrivateModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCreatePrivateModal()">&times;</span>
            <h2>✨ Создать комнату</h2>
            <p style="font-size: 0.85em; margin-bottom: 10px;">Выберите параметры игры</p>
            <div style="margin: 10px 0;">
                <label style="font-size: 0.8em; color: #A0A3BD;">💰 Ставка:</label>
                <select id="privateNominal" class="modal-input">
                    <option value="1000">1 000 RUB</option>
                    <option value="2000">2 000 RUB</option>
                    <option value="5000">5 000 RUB</option>
                </select>
            </div>
            <div style="margin: 10px 0;">
                <label style="font-size: 0.8em; color: #A0A3BD;">👥 Игроков:</label>
                <select id="privatePlayers" class="modal-input">
                    <option value="3">3 игрока</option>
                    <option value="5">5 игроков</option>
                    <option value="7">7 игроков</option>
                    <option value="10">10 игроков</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-primary" onclick="createPrivateRoom()">🚀 Создать</button>
                <button class="modal-btn btn-secondary" onclick="closeCreatePrivateModal()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="joinPrivateModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeJoinPrivateModal()">&times;</span>
            <h2>🔑 Войти по коду</h2>
            <p style="font-size: 0.85em;">Введите код приглашения от друга</p>
            <input type="text" id="inviteCodeInput" class="modal-input" placeholder="XXXXXX" maxlength="6" autocomplete="off" style="text-transform: uppercase; text-align: center;">
            <div class="modal-buttons">
                <button class="modal-btn btn-primary" onclick="joinByCode()">🔓 Войти</button>
                <button class="modal-btn btn-secondary" onclick="closeJoinPrivateModal()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="cabinetModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCabinet()">&times;</span>
            <h2>👤 Личный кабинет</h2>
            <div style="text-align: center; margin: 15px 0;">
                <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 50px; display: inline-block;">
                    🆔 <strong id="accountUserId">LUCKY_</strong>
                    <button onclick="copyUserId()" style="background: none; border: none; color: #F5B042; cursor: pointer;">📋</button>
                </div>
                <div style="margin: 15px 0;">
                    <div style="font-size: 2em; font-weight: 800; color: #F5B042;" id="accountBalance">0</div>
                    <div>RUB</div>
                </div>
                <div class="modal-buttons" style="flex-direction: column;">
                    <button class="modal-btn btn-primary" onclick="deposit()">💳 Пополнить</button>
                    <button class="modal-btn btn-primary" onclick="withdraw()">💸 Вывести</button>
                    <button class="modal-btn btn-secondary" onclick="exportData()">📤 Экспорт</button>
                    <button class="modal-btn btn-secondary" onclick="importData()">📥 Импорт</button>
                    <button class="modal-btn btn-secondary" onclick="logout()" style="background: rgba(231,76,60,0.2); color: #e74c3c;">🚪 Выйти</button>
                </div>
            </div>
        </div>
    </div>

    <div id="gameModal" class="game-modal">
        <div class="game-modal-content">
            <span class="close-modal" onclick="closeGameModal()">&times;</span>
            <h2 id="modalRoomTitle" style="font-size: 1.2em;">Комната</h2>
            <div style="text-align: center; position: relative;">
                <div class="wheel" id="wheel">
                    <div class="wheel-center" id="wheelCenter">🎲</div>
                </div>
            </div>
            <h3 style="font-size: 1em;">Игроки: <span id="playerCount">0</span>/<span id="maxPlayers">0</span></h3>
            <div class="players-grid" id="playersGrid"></div>
            <div id="gameStatus" style="text-align: center; padding: 10px;"></div>
            <div id="gameResult"></div>
            <div id="sharePanel" class="share-panel" style="display: none;"></div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const roomTypes = {
            3: { winners: 1, prizeMultiplier: 2, refund: null, prizeDesc: "1 победитель → 2000 RUB" },
            5: { winners: 2, prizeMultiplier: 2, refund: null, prizeDesc: "2 победителя → по 2000 RUB" },
            7: { winners: 3, prizeMultiplier: 2, refund: null, prizeDesc: "3 победителя → по 2000 RUB" },
            10: { winners: 3, prizeMultiplier: 2, refund: 1, prizeDesc: "3 победителя → по 2000 RUB + возврат 1000 RUB" }
        };

        const nominals = [1000, 2000, 5000];
        const playerCounts = [3, 5, 7, 10];

        let publicRooms = [];
        let privateRooms = [];
        let currentUserId = null;
        let userData = null;
        let myPlayerId = null;
        let updateInterval = null;

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function initPublicRooms() {
            publicRooms = [];
            for (const nominal of nominals) {
                for (const players of playerCounts) {
                    const type = roomTypes[players];
                    publicRooms.push({
                        id: `public_${nominal}_${players}`,
                        nominal: nominal,
                        maxPlayers: players,
                        players: [],
                        gameActive: false,
                        isPrivate: false,
                        prizeDesc: type.prizeDesc,
                        winners: type.winners,
                        prize: nominal * type.prizeMultiplier,
                        refund: type.refund ? nominal * type.refund : null
                    });
                }
            }
        }

        function generateInviteCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function createPrivateRoom() {
            if (!userData) {
                showNotification('Сначала войдите в личный кабинет!', true);
                openCabinet();
                return;
            }

            const nominalSelect = document.getElementById('privateNominal');
            const playersSelect = document.getElementById('privatePlayers');
            
            if (!nominalSelect || !playersSelect) {
                showNotification('Ошибка выбора параметров', true);
                return;
            }
            
            const nominal = parseInt(nominalSelect.value);
            const players = parseInt(playersSelect.value);
            const type = roomTypes[players];
            const inviteCode = generateInviteCode();
            
            const privateRoom = {
                id: `private_${inviteCode}`,
                nominal: nominal,
                maxPlayers: players,
                players: [],
                gameActive: false,
                isPrivate: true,
                inviteCode: inviteCode,
                creatorId: currentUserId,
                createdAt: new Date().toISOString(),
                prizeDesc: type.prizeDesc,
                winners: type.winners,
                prize: nominal * type.prizeMultiplier,
                refund: type.refund ? nominal * type.refund : null
            };
            
            privateRooms.push(privateRoom);
            savePrivateRooms();
            closeCreatePrivateModal();
            showInviteCodeModal(inviteCode, nominal, players);
        }

        function showInviteCodeModal(code, nominal, players) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 350px;">
                    <span class="close-modal" onclick="this.parentElement.parentElement.remove()">&times;</span>
                    <h2>🎉 Комната создана!</h2>
                    <p>Пригласите друзей по коду:</p>
                    <div class="share-code" style="font-size: 1.5em; letter-spacing: 3px;">${code}</div>
                    <div class="modal-buttons" style="flex-direction: column; gap: 8px;">
                        <button class="modal-btn btn-primary" onclick="copyInviteCode('${code}')">📋 Скопировать код</button>
                        <button class="modal-btn btn-secondary" onclick="shareViaTelegram('${code}', ${nominal}, ${players})">📱 Поделиться в Telegram</button>
                    </div>
                    <button class="join-btn" style="margin-top: 12px;" onclick="joinPrivateRoomByCode('${code}'); this.parentElement.parentElement.parentElement.remove();">🔓 Войти в комнату</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function copyInviteCode(code) {
            navigator.clipboard.writeText(code);
            showNotification('✅ Код скопирован! Отправьте друзьям.');
        }

        function shareViaTelegram(code, nominal, players) {
            const text = encodeURIComponent(`🎰 Lucky Number! Присоединяйся ко мне в игру!\nКомната: ${nominal} RUB, ${players} игроков\nКод приглашения: ${code}\nИграй здесь: ${window.location.href}`);
            window.open(`https://t.me/share/url?url=${text}`, '_blank');
        }

        function joinByCode() {
            const code = document.getElementById('inviteCodeInput').value.trim().toUpperCase();
            if (!code) {
                showNotification('Введите код приглашения!', true);
                return;
            }
            joinPrivateRoomByCode(code);
            closeJoinPrivateModal();
            document.getElementById('inviteCodeInput').value = '';
        }

        function joinPrivateRoomByCode(code) {
            const room = privateRooms.find(r => r.inviteCode === code);
            if (!room) {
                showNotification('❌ Комната с таким кодом не найдена!', true);
                return;
            }
            joinRoom(room, true);
        }

        function joinRoom(room, isPrivate = false) {
            if (!userData) {
                showNotification('Сначала войдите в личный кабинет!', true);
                openCabinet();
                return;
            }
            if (room.players.length >= room.maxPlayers || room.gameActive || userData.balance < room.nominal) {
                showNotification('Нельзя войти в эту комнату', true);
                return;
            }

            userData.balance -= room.nominal;
            saveUserData(currentUserId, userData);
            updateUI();

            const taken = room.players.map(p => p.number);
            let available = [];
            for (let i = 1; i <= room.maxPlayers; i++) {
                if (!taken.includes(i)) available.push(i);
            }
            const number = available[Math.floor(Math.random() * available.length)];
            myPlayerId = Date.now() + Math.random();

            room.players.push({
                id: myPlayerId,
                number: number,
                joinedAt: new Date().toISOString()
            });

            if (isPrivate) {
                savePrivateRooms();
                renderPrivateRooms();
            } else {
                savePublicRooms();
                renderPublicRooms();
            }
            updateUI();
            showNotification(`✅ Вы вошли под номером ${number}! (${room.players.length}/${room.maxPlayers})`);

            if (room.players.length === room.maxPlayers) {
                startGame(room, isPrivate);
            } else {
                openGameModal(room, isPrivate);
            }
        }

        function openGameModal(room, isPrivate) {
            const modal = document.getElementById('gameModal');
            const currentPlayer = room.players.find(p => p.id === myPlayerId);
            
            document.getElementById('modalRoomTitle').textContent = `Комната ${room.nominal.toLocaleString()} RUB - Ваш номер ${currentPlayer?.number || '?'}`;
            document.getElementById('maxPlayers').textContent = room.maxPlayers;
            document.getElementById('playerCount').textContent = room.players.length;
            
            const playerNumbers = room.players.map(p => p.number).sort((a,b) => a - b);
            
            const sharePanel = document.getElementById('sharePanel');
            if (room.isPrivate && room.inviteCode) {
                sharePanel.style.display = 'block';
                sharePanel.innerHTML = `
                    <p>🔑 <strong>Код:</strong> <span style="font-family: monospace;">${room.inviteCode}</span></p>
                    <div style="display: flex; gap: 8px; justify-content: center; margin-top: 8px;">
                        <button class="btn-primary" style="padding: 6px 12px; border-radius: 20px; font-size: 0.8em;" onclick="copyInviteCode('${room.inviteCode}')">📋 Копировать</button>
                        <button class="btn-secondary" style="padding: 6px 12px; border-radius: 20px; font-size: 0.8em;" onclick="shareViaTelegram('${room.inviteCode}', ${room.nominal}, ${room.maxPlayers})">📱 Поделиться</button>
                    </div>
                `;
            } else {
                sharePanel.style.display = 'none';
            }
            
            document.getElementById('gameStatus').innerHTML = `
                <div style="text-align: center; padding: 15px;">
                    <h3>⏳ Ожидание игроков...</h3>
                    <p style="font-size: 1.5em; color: #F5B042;">🎲 ${currentPlayer?.number || '?'}</p>
                    <p>В комнате: ${room.players.length}/${room.maxPlayers}</p>
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px;">
                        ${room.players.map(p => `<span style="background: rgba(245,176,66,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.8em;">Номер ${p.number}</span>`).join('')}
                    </div>
                    <p style="margin-top: 10px; font-size: 0.8em;">🏆 ${room.prizeDesc}</p>
                    <p style="margin-top: 8px; font-size: 0.7em; color: #2DD4BF;">🎯 Активные номера: ${playerNumbers.join(', ')}</p>
                </div>
            `;
            modal.classList.add('active');

            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                const updatedRoom = isPrivate ? 
                    privateRooms.find(r => r.id === room.id) : 
                    publicRooms.find(r => r.id === room.id);
                    
                if (updatedRoom && document.getElementById('gameModal').classList.contains('active')) {
                    document.getElementById('playerCount').textContent = updatedRoom.players.length;
                    if (updatedRoom.players.length === updatedRoom.maxPlayers && !updatedRoom.gameActive) {
                        clearInterval(updateInterval);
                        startGame(updatedRoom, isPrivate);
                    }
                }
            }, 1000);
        }

        function startGame(room, isPrivate) {
            if (room.gameActive) return;
            room.gameActive = true;
            
            if (isPrivate) {
                savePrivateRooms();
            } else {
                savePublicRooms();
            }

            const modal = document.getElementById('gameModal');
            if (modal && modal.classList.contains('active')) {
                document.getElementById('gameStatus').innerHTML = '<h3>🎰 Игра начинается! Крутим рулетку...</h3>';
            }
            updateUI();

            setTimeout(() => spinWheel(room, isPrivate), 2000);
        }

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ SPINWHEEL ==========
        function spinWheel(room, isPrivate) {
            const totalPot = room.nominal * room.players.length;
            
            // Получаем список номеров, которые есть в комнате
            const availableNumbers = room.players.map(p => p.number);
            
            // Перемешиваем игроков
            const players = [...room.players];
            for (let i = players.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [players[i], players[j]] = [players[j], players[i]];
            }

            // Определяем победителей
            const winners = [];
            for (let i = 0; i < room.winners && i < players.length; i++) {
                winners.push({ player: players[i], prize: room.prize });
            }
            if (room.refund && players.length >= room.winners + 1) {
                winners.push({ player: players[room.winners], prize: room.refund });
            }

            const wheel = document.getElementById('wheel');
            const wheelCenter = document.getElementById('wheelCenter');

            if (wheel) {
                wheel.classList.add('spinning');
                
                // Анимация: показываем случайные номера ТОЛЬКО из доступных
                const spinInterval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * availableNumbers.length);
                    const randomNum = availableNumbers[randomIndex];
                    if (wheelCenter) wheelCenter.textContent = randomNum;
                }, 100);

                setTimeout(() => {
                    clearInterval(spinInterval);
                    wheel.classList.remove('spinning');
                    
                    const finalNumber = winners[0]?.player.number || availableNumbers[0];
                    if (wheelCenter) wheelCenter.textContent = finalNumber;

                    let myWin = 0;
                    let myWinningNumber = null;
                    
                    room.players = room.players.map(p => {
                        const win = winners.find(w => w.player.id === p.id);
                        if (win) {
                            if (p.id === myPlayerId) {
                                userData.balance += win.prize;
                                myWin = win.prize;
                                myWinningNumber = p.number;
                            }
                        }
                        return p;
                    });

                    if (myWin > 0) {
                        showWinToast(myWin, myWinningNumber);
                        blinkTabTitle();
                    }

                    const gameRecord = {
                        date: new Date().toLocaleString(),
                        nominal: room.nominal,
                        maxPlayers: room.maxPlayers,
                        totalPot: totalPot,
                        winners: winners.map(w => ({ number: w.player.number, prize: w.prize })),
                        myWin: myWin,
                        isPrivate: isPrivate,
                        inviteCode: room.inviteCode
                    };
                    userData.history.unshift(gameRecord);
                    saveUserData(currentUserId, userData);

                    const resultDiv = document.getElementById('gameResult');
                    resultDiv.innerHTML = `
                        <div class="result-box">
                            <h3>🎉 РЕЗУЛЬТАТЫ! 🎉</h3>
                            <p><strong>Общий банк:</strong> ${totalPot.toLocaleString()} RUB</p>
                            <hr>
                            <h4>🏆 Победители:</h4>
                            ${winners.map(w => `🎲 Номер ${w.player.number} - выиграл ${w.prize.toLocaleString()} RUB`).join('<br>')}
                            ${myWin ? `<h3 style="margin-top: 10px;">✨ ВЫ ВЫИГРАЛИ ${myWin.toLocaleString()} RUB! ✨</h3>` : '<p style="margin-top: 10px;">😢 В следующий раз повезет!</p>'}
                        </div>
                    `;

                    if (isPrivate) {
                        const index = privateRooms.findIndex(r => r.id === room.id);
                        if (index !== -1) privateRooms.splice(index, 1);
                        savePrivateRooms();
                        renderPrivateRooms();
                    } else {
                        const index = publicRooms.findIndex(r => r.id === room.id);
                        if (index !== -1) {
                            publicRooms[index] = { ...room, players: [], gameActive: false };
                        }
                        savePublicRooms();
                        renderPublicRooms();
                    }
                    
                    updateUI();
                    renderHistory();

                    setTimeout(() => closeGameModal(), 6000);
                }, 3000);
            }
        }

        // ========== UI ФУНКЦИИ ==========
        function renderPublicRooms() {
            const grid = document.getElementById('publicTab');
            if (!grid) return;
            
            grid.innerHTML = publicRooms.map((room, idx) => `
                <div class="room-card">
                    <div class="room-header">
                        <div class="room-bet">${room.nominal.toLocaleString()} <small>RUB</small></div>
                        <div class="room-players-count">👥 ${room.maxPlayers} игр</div>
                    </div>
                    <div class="prize-info">🏆 ${room.prizeDesc}</div>
                    <div class="player-avatars">
                        ${room.players.slice(0, 8).map(p => `<div class="player-dot">${p.number}</div>`).join('')}
                        ${room.players.length > 8 ? `<div class="player-dot">+${room.players.length-8}</div>` : ''}
                    </div>
                    <div>👥 ${room.players.length}/${room.maxPlayers}</div>
                    <button class="join-btn" onclick="joinRoom(publicRooms[${idx}], false)" 
                        ${!userData || room.players.length >= room.maxPlayers || room.gameActive || userData.balance < room.nominal ? 'disabled' : ''}>
                        ${room.players.length >= room.maxPlayers ? '🔴 Полная' : 
                          room.gameActive ? '🎲 Игра идет' : 
                          `Войти (${room.nominal.toLocaleString()} RUB)`}
                    </button>
                </div>
            `).join('');
        }

        function renderPrivateRooms() {
            const grid = document.getElementById('privateTab');
            if (!grid) return;
            
            if (privateRooms.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 30px; color: #A0A3BD;">Нет активных комнат<br>✨ Создайте свою!</div>';
                return;
            }
            
            grid.innerHTML = privateRooms.map((room, idx) => `
                <div class="room-card private">
                    <div class="private-badge">🔒 Приватная</div>
                    <div class="room-header">
                        <div class="room-bet">${room.nominal.toLocaleString()} <small>RUB</small></div>
                        <div class="room-players-count">👥 ${room.maxPlayers} игр</div>
                    </div>
                    <div class="prize-info">🏆 ${room.prizeDesc}</div>
                    <div class="invite-code">🔑 Код: ${room.inviteCode}</div>
                    <div class="player-avatars">
                        ${room.players.slice(0, 8).map(p => `<div class="player-dot">${p.number}</div>`).join('')}
                        ${room.players.length > 8 ? `<div class="player-dot">+${room.players.length-8}</div>` : ''}
                    </div>
                    <div>👥 ${room.players.length}/${room.maxPlayers}</div>
                    <button class="join-btn" onclick="joinRoom(privateRooms[${idx}], true)" 
                        ${!userData || room.players.length >= room.maxPlayers || room.gameActive || userData.balance < room.nominal ? 'disabled' : ''}>
                        ${room.players.length >= room.maxPlayers ? '🔴 Полная' : 
                          room.gameActive ? '🎲 Игра идет' : 
                          `Войти (${room.nominal.toLocaleString()} RUB)`}
                    </button>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (!userData || userData.history.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666; padding: 15px;">История пуста</div>';
                return;
            }
            container.innerHTML = userData.history.slice(0, 15).map(game => `
                <div class="history-item">
                    <strong>📅 ${game.date}</strong><br>
                    🎲 ${game.nominal.toLocaleString()} RUB | ${game.maxPlayers} игр${game.isPrivate ? ' 🔒' : ''}<br>
                    🏆 ${game.winners.map(w => `#${w.number} (${w.prize.toLocaleString()} RUB)`).join(', ')}<br>
                    ${game.myWin > 0 ? `🎉 +${game.myWin.toLocaleString()} RUB!` : '😢 Не повезло'}
                </div>
            `).join('');
        }

        function updateUI() {
            if (userData) {
                document.getElementById('headerBalance').textContent = userData.balance;
                document.getElementById('accountBalance').textContent = userData.balance;
                document.getElementById('accountUserId').textContent = `LUCKY_${currentUserId}`;
            }
            renderPublicRooms();
            renderPrivateRooms();
            renderHistory();
        }

        function switchTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            if (tab === 'public') {
                document.getElementById('publicTab').style.display = 'grid';
                document.getElementById('privateTab').style.display = 'none';
                renderPublicRooms();
            } else {
                document.getElementById('publicTab').style.display = 'none';
                document.getElementById('privateTab').style.display = 'grid';
                renderPrivateRooms();
            }
        }

        // ========== ХРАНЕНИЕ ДАННЫХ ==========
        function savePublicRooms() { localStorage.setItem('lucky_public_rooms', JSON.stringify(publicRooms)); }
        function savePrivateRooms() { localStorage.setItem('lucky_private_rooms', JSON.stringify(privateRooms)); }
        
        function loadPrivateRooms() {
            const saved = localStorage.getItem('lucky_private_rooms');
            if (saved) privateRooms = JSON.parse(saved);
        }
        
        function loadPublicRooms() {
            const saved = localStorage.getItem('lucky_public_rooms');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed && parsed.length) {
                    parsed.forEach((savedRoom, idx) => {
                        if (publicRooms[idx]) {
                            publicRooms[idx].players = savedRoom.players || [];
                            publicRooms[idx].gameActive = savedRoom.gameActive || false;
                        }
                    });
                }
            }
        }

        // ========== ФУНКЦИИ ПОЛЬЗОВАТЕЛЯ ==========
        function generateNewId() { return Math.random().toString(36).substring(2, 14).toUpperCase(); }
        
        function loadUserData(id) {
            return {
                balance: parseInt(localStorage.getItem(`lucky_balance_${id}`)) || 10000,
                history: JSON.parse(localStorage.getItem(`lucky_history_${id}`) || '[]')
            };
        }
        
        function saveUserData(id, data) {
            localStorage.setItem(`lucky_balance_${id}`, data.balance);
            localStorage.setItem(`lucky_history_${id}`, JSON.stringify(data.history));
        }

        function showNotification(message, isError = false) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.background = isError ? '#e74c3c' : '#2DD4BF';
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function showWinToast(amount, number) {
            const toast = document.createElement('div');
            toast.className = 'win-toast';
            toast.innerHTML = `<div class="win-toast-content">🎉✨ ПОБЕДА! ✨🎉<br>Номер ${number} выиграл!<br>+${amount.toLocaleString()} RUB</div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function blinkTabTitle() {
            const originalTitle = document.title;
            let count = 0;
            const interval = setInterval(() => {
                document.title = count % 2 === 0 ? '🏆 ПОБЕДА! 🏆' : originalTitle;
                count++;
                if (count > 8) clearInterval(interval);
            }, 500);
        }

        function openCabinet() { document.getElementById('cabinetModal').classList.add('active'); }
        function closeCabinet() { document.getElementById('cabinetModal').classList.remove('active'); }
        function closeCreatePrivateModal() { document.getElementById('createPrivateModal').classList.remove('active'); }
        function closeJoinPrivateModal() { document.getElementById('joinPrivateModal').classList.remove('active'); }
        function closeGameModal() { document.getElementById('gameModal').classList.remove('active'); if (updateInterval) clearInterval(updateInterval); }
        
        function copyUserId() { navigator.clipboard.writeText(`LUCKY_${currentUserId}`); showNotification('✅ ID скопирован!'); }
        
        function deposit() { const amount = prompt('💰 Введите сумму пополнения (RUB):', '1000'); if (amount && !isNaN(amount) && parseInt(amount) > 0) { userData.balance += parseInt(amount); saveUserData(currentUserId, userData); updateUI(); showNotification(`✅ Пополнено на ${parseInt(amount).toLocaleString()} RUB`); } }
        
        function withdraw() { const amount = prompt('💸 Введите сумму вывода (RUB):', '1000'); if (amount && !isNaN(amount) && parseInt(amount) > 0 && userData.balance >= parseInt(amount)) { userData.balance -= parseInt(amount); saveUserData(currentUserId, userData); updateUI(); showNotification(`✅ Заявка на вывод ${parseInt(amount).toLocaleString()} RUB принята`); } else { showNotification('❌ Недостаточно средств', true); } }
        
        function exportData() { const data = { userId: currentUserId, balance: userData.balance, history: userData.history }; const blob = new Blob([JSON.stringify(data)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `lucky_backup_${currentUserId}.json`; a.click(); showNotification('📤 Данные экспортированы'); }
        
        function importData() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json'; input.onchange = e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = ev => { try { const data = JSON.parse(ev.target.result); if (data.userId) currentUserId = data.userId; if (data.balance) userData.balance = data.balance; if (data.history) userData.history = data.history; saveUserData(currentUserId, userData); updateUI(); showNotification('✅ Данные импортированы'); } catch(e) { showNotification('❌ Ошибка импорта', true); } }; reader.readAsText(file); }; input.click(); }
        
        function logout() { if (confirm('Выйти из аккаунта?')) { currentUserId = null; userData = null; updateUI(); closeCabinet(); showNotification('👋 Вы вышли'); } }

        // ========== ЗАПУСК ==========
        initPublicRooms();
        loadPublicRooms();
        loadPrivateRooms();
        currentUserId = generateNewId();
        userData = loadUserData(currentUserId);
        updateUI();

        setInterval(() => {
            publicRooms.forEach((room, idx) => {
                if (room.players.length === room.maxPlayers && !room.gameActive) {
                    startGame(room, false);
                }
            });
            privateRooms.forEach((room, idx) => {
                if (room.players.length === room.maxPlayers && !room.gameActive) {
                    startGame(room, true);
                }
            });
        }, 2000);
    </script>
</body>
</html>
