<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lucky Number - Счастливый Номер | Моментальная лотерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .logo h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p {
            font-size: 0.8em;
            color: #aaa;
        }

        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .balance-card {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
        }
        .balance-card .value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .room-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .room-bet {
            font-size: 2em;
            font-weight: bold;
            color: #f39c12;
        }
        .player-avatars {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .player-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .join-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .join-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 30px;
            padding: 30px;
            max-width: 800px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid rgba(243,156,18,0.5);
        }
        .close-modal {
            float: right;
            font-size: 30px;
            cursor: pointer;
            color: #f39c12;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .player-card {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .player-card.winner {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            animation: pulse 0.5s;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .player-number {
            font-size: 1.5em;
            font-weight: bold;
        }
        .result-box {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .wheel {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: conic-gradient(#f39c12 0deg 36deg, #e67e22 36deg 72deg, #2ecc71 72deg 108deg, #3498db 108deg 144deg, #9b59b6 144deg 180deg, #e74c3c 180deg 216deg, #1abc9c 216deg 252deg, #f1c40f 252deg 288deg, #e67e22 288deg 324deg, #f39c12 324deg 360deg);
            transition: transform 3s cubic-bezier(0.33, 1, 0.68, 1);
            position: relative;
        }
        .wheel.spinning {
            transform: rotate(1440deg);
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: #1a1a2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 2000;
        }
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 0.8em;
        }
        .section-title {
            font-size: 1.5em;
            margin: 30px 0 20px;
            padding-left: 15px;
            border-left: 4px solid #f39c12;
        }
        .admin-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.7em;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
        }
        .admin-link:hover {
            color: rgba(255,255,255,0.6);
        }
        @media (max-width: 768px) {
            .players-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🎰 Lucky Number</h1>
                <p>Счастливый Номер | Моментальная лотерея</p>
            </div>
            <div class="user-info">
                <div class="balance-card">
                    <div>💰 Баланс</div>
                    <div class="value" id="balance">10000</div>
                    <div>RUB</div>
                </div>
                <button class="btn btn-secondary" onclick="game.showDepositModal()">💳 Пополнить</button>
            </div>
        </div>

        <div class="section-title">🎲 Выберите комнату</div>
        <div class="rooms-grid" id="roomsGrid"></div>

        <div class="section-title">📜 История игр</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <a href="admin.html" class="admin-link">🔐 Администраторам</a>

    <script>
        class LuckyNumberGame {
            constructor() {
                this.balance = 10000;
                this.currentRoom = null;
                this.myPlayerId = null;
                this.myNumber = null;
                this.rooms = [
                    { nominal: 100, players: [], maxPlayers: 10, gameActive: false },
                    { nominal: 200, players: [], maxPlayers: 10, gameActive: false },
                    { nominal: 500, players: [], maxPlayers: 10, gameActive: false },
                    { nominal: 1000, players: [], maxPlayers: 10, gameActive: false },
                    { nominal: 2000, players: [], maxPlayers: 10, gameActive: false },
                    { nominal: 5000, players: [], maxPlayers: 10, gameActive: false }
                ];
                this.history = [];
                this.updateInterval = null;
                
                this.loadData();
                this.init();
            }

            init() {
                this.renderRooms();
                this.renderHistory();
                this.updateBalance();
            }

            loadData() {
                const savedBalance = localStorage.getItem('lucky_balance');
                if (savedBalance) this.balance = parseInt(savedBalance);
                
                const savedHistory = localStorage.getItem('lucky_history');
                if (savedHistory) this.history = JSON.parse(savedHistory);
            }

            saveData() {
                localStorage.setItem('lucky_balance', this.balance);
                localStorage.setItem('lucky_history', JSON.stringify(this.history));
            }

            updateBalance() {
                document.getElementById('balance').textContent = this.balance;
            }

            showNotification(message, isError = false) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                notification.style.background = isError ? '#e74c3c' : '#2ecc71';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }

            renderRooms() {
                const grid = document.getElementById('roomsGrid');
                if (!grid) return;
                
                grid.innerHTML = this.rooms.map((room, index) => `
                    <div class="room-card">
                        <div class="room-bet">${room.nominal} <small>RUB</small></div>
                        <div class="player-avatars">
                            ${room.players.slice(0, 8).map(p => `<div class="player-dot">${p.number}</div>`).join('')}
                            ${room.players.length > 8 ? `<div class="player-dot">+${room.players.length-8}</div>` : ''}
                        </div>
                        <div>👥 ${room.players.length}/${room.maxPlayers} игроков</div>
                        <button class="join-btn" onclick="game.joinRoom(${index})" 
                            ${room.players.length >= room.maxPlayers || room.gameActive || this.balance < room.nominal ? 'disabled' : ''}>
                            ${room.players.length >= room.maxPlayers ? '🔴 Полная' : 
                              room.gameActive ? '🎲 Игра идет' : 
                              `Войти (${room.nominal} RUB)`}
                        </button>
                    </div>
                `).join('');
            }

            joinRoom(roomIndex) {
                const room = this.rooms[roomIndex];
                
                if (room.players.length >= room.maxPlayers) {
                    this.showNotification('Комната уже полна!', true);
                    return;
                }
                if (room.gameActive) {
                    this.showNotification('Игра уже началась!', true);
                    return;
                }
                if (this.balance < room.nominal) {
                    this.showNotification(`Недостаточно средств! Нужно ${room.nominal} RUB`, true);
                    return;
                }
                
                this.balance -= room.nominal;
                this.updateBalance();
                
                const takenNumbers = room.players.map(p => p.number);
                let availableNumbers = [];
                for (let i = 1; i <= 10; i++) {
                    if (!takenNumbers.includes(i)) availableNumbers.push(i);
                }
                
                const randomNumber = availableNumbers[Math.floor(Math.random() * availableNumbers.length)];
                this.myNumber = randomNumber;
                this.myPlayerId = Date.now() + Math.random();
                
                room.players.push({
                    id: this.myPlayerId,
                    number: randomNumber,
                    joinedAt: new Date().toISOString()
                });
                
                this.showNotification(`✅ Вы вошли под номером ${randomNumber}!`);
                this.renderRooms();
                this.saveData();
                
                if (room.players.length === room.maxPlayers) {
                    this.startGame(roomIndex);
                } else {
                    this.openGameModal(roomIndex);
                }
            }
            
            openGameModal(roomIndex) {
                const room = this.rooms[roomIndex];
                this.currentRoom = { ...room, index: roomIndex };
                
                const modal = document.getElementById('gameModal') || this.createModal();
                document.getElementById('modalRoomTitle').textContent = `Комната ${room.nominal} RUB - Ваш номер ${this.myNumber}`;
                document.getElementById('playerCount').textContent = room.players.length;
                document.getElementById('gameStatus').innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h3>⏳ Ожидание игроков...</h3>
                        <p style="font-size: 2em; color: #f39c12;">🎲 ${this.myNumber}</p>
                        <p>Игроков в комнате: ${room.players.length}/10</p>
                        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px;">
                            ${room.players.map(p => `<span style="background: #667eea; padding: 5px 12px; border-radius: 20px;">Номер ${p.number}</span>`).join('')}
                        </div>
                    </div>
                `;
                modal.classList.add('active');
                
                if (this.updateInterval) clearInterval(this.updateInterval);
                this.updateInterval = setInterval(() => {
                    const updatedRoom = this.rooms[roomIndex];
                    if (updatedRoom && document.getElementById('gameModal')?.classList.contains('active')) {
                        document.getElementById('playerCount').textContent = updatedRoom.players.length;
                        if (updatedRoom.players.length === updatedRoom.maxPlayers && !updatedRoom.gameActive) {
                            clearInterval(this.updateInterval);
                            this.startGame(roomIndex);
                        }
                    }
                }, 1000);
            }
            
            startGame(roomIndex) {
                const room = this.rooms[roomIndex];
                if (room.gameActive) return;
                room.gameActive = true;
                this.currentRoom = { ...room, index: roomIndex };
                
                const modal = document.getElementById('gameModal');
                if (modal) {
                    document.getElementById('gameStatus').innerHTML = '<h3>🎰 Игра начинается! Крутим рулетку...</h3>';
                    this.renderPlayersInModal();
                }
                
                setTimeout(() => this.spinWheel(), 2000);
            }
            
            renderPlayersInModal() {
                if (!this.currentRoom) return;
                const grid = document.getElementById('playersGrid');
                if (!grid) return;
                
                grid.innerHTML = this.currentRoom.players.map(player => `
                    <div class="player-card">
                        <div class="player-number">🎲 ${player.number}</div>
                        <div>${player.id === this.myPlayerId ? '⭐ Вы' : 'Игрок'}</div>
                        <div style="color: #2ecc71;">${player.prize ? `+${player.prize} RUB` : ''}</div>
                    </div>
                `).join('');
                document.getElementById('playerCount').textContent = this.currentRoom.players.length;
            }
            
            spinWheel() {
                const totalPot = this.currentRoom.nominal * this.currentRoom.players.length;
                const platformFee = totalPot * 0.30;
                const prizePool = totalPot * 0.70;
                const nominal = this.currentRoom.nominal;
                
                const players = [...this.currentRoom.players];
                for (let i = players.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [players[i], players[j]] = [players[j], players[i]];
                }
                
                const winners = [];
                for (let i = 0; i < 3 && i < players.length; i++) {
                    winners.push({
                        player: players[i],
                        prize: nominal * 2,
                        percent: 20
                    });
                }
                if (players.length >= 4) {
                    winners.push({
                        player: players[3],
                        prize: nominal,
                        percent: 10
                    });
                }
                
                const wheel = document.getElementById('wheel');
                const wheelCenter = document.getElementById('wheelCenter');
                
                if (wheel) {
                    wheel.classList.add('spinning');
                    let spinCount = 0;
                    const spinInterval = setInterval(() => {
                        const randomNum = Math.floor(Math.random() * 10) + 1;
                        if (wheelCenter) wheelCenter.textContent = randomNum;
                        spinCount++;
                    }, 100);
                    
                    setTimeout(() => {
                        clearInterval(spinInterval);
                        wheel.classList.remove('spinning');
                        if (wheelCenter) wheelCenter.textContent = winners[0]?.player.number || '?';
                        
                        this.currentRoom.players = this.currentRoom.players.map(p => {
                            const win = winners.find(w => w.player.id === p.id);
                            if (win) {
                                p.won = true;
                                p.prize = win.prize;
                                if (p.id === this.myPlayerId) {
                                    this.balance += win.prize;
                                    this.updateBalance();
                                }
                            }
                            return p;
                        });
                        
                        this.renderPlayersInModal();
                        
                        const resultDiv = document.getElementById('gameResult');
                        const winnersList = winners.map(w => `🎲 Номер ${w.player.number} - ${w.percent}% (${w.prize} RUB)`).join('<br>');
                        const myWin = winners.find(w => w.player.id === this.myPlayerId);
                        
                        resultDiv.innerHTML = `
                            <div class="result-box">
                                <h3>🎉 РЕЗУЛЬТАТЫ РОЗЫГРЫША! 🎉</h3>
                                <p><strong>Общий банк:</strong> ${totalPot} RUB</p>
                                <p><strong>💰 Комиссия платформы (30%):</strong> ${platformFee} RUB</p>
                                <p><strong>🎁 Призовой фонд (70%):</strong> ${prizePool} RUB</p>
                                <hr>
                                <h4>🏆 Победители:</h4>
                                ${winnersList}
                                ${myWin ? `<h3 style="margin-top: 15px; color: #f1c40f;">✨ ВЫ ВЫИГРАЛИ ${myWin.prize} RUB! ✨</h3>` : '<p style="margin-top: 15px;">😢 В следующий раз повезет!</p>'}
                            </div>
                        `;
                        
                        const gameRecord = {
                            id: Date.now(),
                            date: new Date().toLocaleString(),
                            nominal: this.currentRoom.nominal,
                            totalPot: totalPot,
                            platformFee: platformFee,
                            prizePool: prizePool,
                            playersCount: this.currentRoom.players.length,
                            winners: winners.map(w => ({ number: w.player.number, prize: w.prize, percent: w.percent })),
                            myNumber: this.myNumber,
                            myWin: myWin ? myWin.prize : 0
                        };
                        
                        this.history.unshift(gameRecord);
                        if (this.history.length > 30) this.history.pop();
                        this.saveData();
                        this.renderHistory();
                        
                        this.rooms[this.currentRoom.index] = {
                            nominal: this.currentRoom.nominal,
                            players: [],
                            maxPlayers: 10,
                            gameActive: false
                        };
                        
                        this.renderRooms();
                        
                        setTimeout(() => this.closeModal(), 8000);
                    }, 3000);
                }
            }
            
            createModal() {
                const modalDiv = document.createElement('div');
                modalDiv.id = 'gameModal';
                modalDiv.className = 'modal';
                modalDiv.innerHTML = `
                    <div class="modal-content">
                        <span class="close-modal" onclick="game.closeModal()">&times;</span>
                        <h2 id="modalRoomTitle">Комната</h2>
                        <div style="text-align: center;">
                            <div class="wheel" id="wheel">
                                <div class="wheel-center" id="wheelCenter">🎲</div>
                            </div>
                        </div>
                        <div class="players-list">
                            <h3>Игроки в комнате (<span id="playerCount">0</span>/10)</h3>
                            <div class="players-grid" id="playersGrid"></div>
                        </div>
                        <div id="gameStatus" style="text-align: center; padding: 15px;"></div>
                        <div id="gameResult"></div>
                    </div>
                `;
                document.body.appendChild(modalDiv);
                return modalDiv;
            }
            
            renderHistory() {
                const historyDiv = document.getElementById('historyList');
                if (!historyDiv) return;
                
                if (this.history.length === 0) {
                    historyDiv.innerHTML = '<div style="text-align: center; color: #aaa;">История игр пуста</div>';
                    return;
                }
                
                historyDiv.innerHTML = this.history.slice(0, 15).map(game => `
                    <div class="history-item">
                        <strong>${game.date}</strong> | Комната ${game.nominal} RUB | ${game.playersCount} игроков<br>
                        🏆 Победители: ${game.winners.map(w => `#${w.number} (${w.prize} RUB)`).join(', ')}<br>
                        ${game.myWin > 0 ? `🎉 Ваш выигрыш: ${game.myWin} RUB!` : '😢 Вы не выиграли'}
                    </div>
                `).join('');
            }
            
            showDepositModal() {
                const amount = prompt('Введите сумму пополнения (RUB):', '1000');
                if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                    this.balance += parseInt(amount);
                    this.updateBalance();
                    this.saveData();
                    this.showNotification(`Баланс пополнен на ${amount} RUB!`);
                    this.renderRooms();
                }
            }
            
            closeModal() {
                const modal = document.getElementById('gameModal');
                if (modal) {
                    modal.classList.remove('active');
                    document.getElementById('gameResult').innerHTML = '';
                    this.currentRoom = null;
                    if (this.updateInterval) clearInterval(this.updateInterval);
                }
            }
        }
        
        const game = new LuckyNumberGame();
    </script>
</body>
</html>
